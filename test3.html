<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notification Example</title>
  <!-- Font Awesome CDN -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    /* Container for notifications (top-right) */
    #notification-container {
      position: fixed;
      top: 20px;
      right: 20px; /* changed from left to right */
      z-index: 9999;
    }

    /* Individual notification */
    #notification-container .notification {
      background-color: #ffffff;
      color: #088000;
      padding: 15px 20px;
      border-radius: 8px;
      min-width: 250px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
      margin-bottom: 10px;
      overflow: hidden;
      position: relative;
      font-family: Arial, sans-serif;
      opacity: 0;
      transform: translateX(50px); /* slide in from right */
      animation: slideIn 0.3s forwards;
    }

    /* Slide-in animation from right */
    /* Slide-in animation */
    @keyframes slideIn {
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    /* Sliding out wiggling animation */
    @keyframes slideOutWiggle {
      0% { opacity: 1; transform: translateX(0) translateY(0) rotate(0deg); }
      25% { transform: translateX(20px) translateY(-5px) rotate(-5deg); }
      50% { transform: translateX(-20px) translateY(5px) rotate(5deg); }
      75% { transform: translateX(20px) translateY(-5px) rotate(-5deg); }
      100% { opacity: 0; transform: translateX(-50px) translateY(0) rotate(0deg); }
    }

    /* Message inside notification */
    #notification-container .notification .message {
      margin-bottom: 16px;
      font-size: 14px;
    }

    /* Progress bar */
    #notification-container .notification .progress-bar {
      height: 6px;
      background-color: #088000;
      width: 100%;
      transition: width 0.1s linear;
      border-radius: 6px;
    }

    /* Stack notifications nicely */
    #notification-container .notification + #notification-container .notification {
      margin-top: 5px;
    }

    /* Example button styling */
    .notif-btn {
      padding: 10px 20px;
      background-color: #088000;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
    }

    .notif-btn:hover {
      background-color: #066000;
    }
  </style>
</head>
<body>
  <h1>Notification Demo</h1>
  <button class="notif-btn" onclick="showNotification(`<i class='fa-solid fa-check-circle'></i> Order placed successfully!`, 3000)">
    Place Order
  </button>

  <!-- Notification container -->
  <div id="notification-container"></div>

  <script>
    function showNotification(message, duration = 3000) {
      const notification = document.createElement('div');
      notification.classList.add('notification');
      notification.innerHTML = `
        <div class="message">${message}</div>
        <div class="progress-bar"></div>
      `;
      document.getElementById('notification-container').appendChild(notification);

      const progressBar = notification.querySelector('.progress-bar');
      let startTime = null;

      function animateProgress(timestamp) {
        if (!startTime) startTime = timestamp;
        const elapsed = timestamp - startTime;
        const progress = Math.max(0, 1 - elapsed / duration);
        progressBar.style.width = `${progress * 100}%`;

        if (elapsed < duration) {
          requestAnimationFrame(animateProgress);
        } else {
          // Trigger slide-out wiggle animation
          notification.style.animation = 'slideOutWiggle 0.8s forwards';
          setTimeout(() => notification.remove(), 800);
        }
      }

      requestAnimationFrame(animateProgress);
    }
  </script>
</body>
</html>
