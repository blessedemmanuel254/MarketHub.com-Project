<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Makethub Payment Demo</title>

<style>
/* ===== GLOBAL ===== */
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f0f0f;
  color: #fff;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding-top: 50px;
}

/* Demo Buttons */
.demo-btn {
  padding: 12px 20px;
  margin: 10px;
  border: none;
  border-radius: 8px;
  background: #ffcc00;
  color: #000;
  font-weight: bold;
  cursor: pointer;
}

/* ===== OVERLAY ===== */
.payOverlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.7);
  display: none;
  z-index: 1000;
}

/* ===== MODAL ===== */
.paymentContainer {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: #111;
  padding: 25px;
  border-radius: 12px;
  width: 350px;
  display: none;
  z-index: 1001;
}

/* Radio */
.radio-container {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: #1a1a1a;
  padding: 10px;
  border-radius: 8px;
  margin-bottom: 10px;
  cursor: pointer;
}

.rightDiv {
  display: flex;
  gap: 10px;
  align-items: center;
}

/* Button */
.paymentContainer button {
  width: 100%;
  padding: 12px;
  background: #ffcc00;
  border: none;
  border-radius: 8px;
  font-weight: bold;
  margin-top: 10px;
}

/* Status */
.statusBox {
  margin-top: 15px;
  padding: 15px;
  border-radius: 8px;
  display: none;
}

.info { background: #2c2c2c; }
.success { background: #2e7d32; }
.error { background: #c62828; }

.loader {
  border: 4px solid #333;
  border-top: 4px solid #ffcc00;
  border-radius: 50%;
  width: 25px;
  height: 25px;
  margin: 10px auto;
  animation: spin 1s linear infinite;
}

@keyframes spin {
  100% { transform: rotate(360deg); }
}
</style>

</head>

<body>

<h2>Makethub Payment Demo</h2>

<!-- DEMO BUTTONS -->

<button class="demo-btn" onclick="togglePaymentOption('pay', 101)">
  Pay for Order #101
</button>

<button class="demo-btn" onclick="togglePaymentOption('withdraw', 55)">
  Withdraw KES 500
</button>

<!-- OVERLAY -->

<div class="payOverlay" onclick="togglePaymentOption()" id="payOverlay"></div>

<!-- MODAL -->

<form class="paymentContainer" id="paymentContainer" onsubmit="event.preventDefault(); startFlow();">

  <h2 id="title">Choose Account</h2>

  <!-- STEP 1 -->

  <div id="selectionStep">
    <label class="radio-container">
      <div class="rightDiv">
        <img src="https://upload.wikimedia.org/wikipedia/commons/1/15/M-PESA_LOGO-01.svg" width="50">
        <p>M-PESA<br><span id="userPhone">2547XXXXXXXX</span></p>
      </div>
      <input type="radio" checked>
    </label>

```
<button type="submit">Continue</button>
```

  </div>

  <!-- STEP 2+ -->

  <div id="statusBox" class="statusBox info">
    <div id="statusText"></div>
    <div class="loader" id="loader"></div>
  </div>

<a href="#" onclick="togglePaymentOption()">Cancel</a>

</form>

<script>
let paymentType = "pay";
let referenceId = null;

/* ===== TOGGLE MODAL ===== */
function togglePaymentOption(type = "pay", ref = null) {
  const overlay = document.getElementById("payOverlay");
  const modal = document.getElementById("paymentContainer");

  paymentType = type;
  referenceId = ref;

  const visible = modal.style.display === "block";

  overlay.style.display = visible ? "none" : "block";
  modal.style.display = visible ? "none" : "block";

  resetUI();
}

/* ===== RESET ===== */
function resetUI() {
  document.getElementById("selectionStep").style.display = "block";
  document.getElementById("statusBox").style.display = "none";
}

/* ===== STATUS ===== */
function showStatus(msg, type="info", loading=true) {
  const box = document.getElementById("statusBox");
  const text = document.getElementById("statusText");
  const loader = document.getElementById("loader");

  box.style.display = "block";
  box.className = "statusBox " + type;

  text.innerText = msg;
  loader.style.display = loading ? "block" : "none";
}

/* ===== START FLOW ===== */
function startFlow() {

  document.getElementById("selectionStep").style.display = "none";

  showStatus("Initiating request...", "info", true);

  fetch(`mpesa.php?action=${paymentType}`, {
    method: "POST",
    headers: {"Content-Type": "application/x-www-form-urlencoded"},
    body: `reference_id=${referenceId}`
  })
  .then(res => res.json())
  .then(data => {

    showStatus("📲 STK Push sent. Enter your M-Pesa PIN", "info", true);

    waitForPayment();

  })
  .catch(() => {
    showStatus("Failed to initiate request", "error", false);
  });
}

/* ===== WAIT ===== */
function waitForPayment() {
  showStatus("Waiting for confirmation...", "info", true);

  setTimeout(checkStatus, 5000);
}

/* ===== RESULT ===== */
function checkStatus() {

  showStatus("Processing payment...", "info", true);

  setTimeout(() => {

    let success = Math.random() > 0.3;

    if (success) {
      showStatus("✅ Success! Redirecting...", "success", false);

      setTimeout(() => {
        location.reload();
      }, 2000);

    } else {
      showStatus("❌ Payment failed or cancelled", "error", false);
    }

  }, 3000);
}
</script>

</body>
</html>
