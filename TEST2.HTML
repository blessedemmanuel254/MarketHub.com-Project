<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Makethub Secure Payment</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}
body{background:#f5f7fb;display:flex;align-items:center;justify-content:center;height:100vh;}

.payment-container{
  width:100%;
  max-width:420px;
  background:#fff;
  border-radius:18px;
  box-shadow:0 10px 30px rgba(0,0,0,0.08);
  overflow:hidden;
}

.header{
  background:linear-gradient(135deg,#0f9d58,#0c7c45);
  color:#fff;
  padding:20px;
  text-align:center;
}

.header h2{font-size:18px;font-weight:600;}
.header p{font-size:13px;opacity:0.9;margin-top:5px;}

.content{padding:20px;}

.amount{
  text-align:center;
  margin-bottom:20px;
}
.amount h1{font-size:28px;color:#111;}
.amount span{font-size:13px;color:#777;}

.details{
  background:#f9fafc;
  border-radius:12px;
  padding:15px;
  margin-bottom:20px;
}

.details div{
  display:flex;
  justify-content:space-between;
  margin-bottom:10px;
  font-size:14px;
}

.details div:last-child{margin-bottom:0;}

.label{color:#666;}
.value{font-weight:600;color:#111;}

.input-group{margin-bottom:15px;}
.input-group label{font-size:13px;color:#555;margin-bottom:5px;display:block;}
.input-group input{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:1px solid #ddd;
  outline:none;
  font-size:14px;
}

.pay-btn{
  width:100%;
  background:#0f9d58;
  color:#fff;
  border:none;
  padding:14px;
  border-radius:12px;
  font-size:15px;
  font-weight:600;
  cursor:pointer;
  transition:0.3s;
}

.pay-btn:hover{background:#0c7c45;}

.footer{
  text-align:center;
  font-size:12px;
  color:#777;
  padding:15px;
}

.secure{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:6px;
  margin-top:5px;
}

.spinner{
  display:none;
  margin:10px auto;
  width:24px;height:24px;
  border:3px solid #ddd;
  border-top:3px solid #0f9d58;
  border-radius:50%;
  animation:spin 1s linear infinite;
}

@keyframes spin{
  to{transform:rotate(360deg);} 
}

.success{
  display:none;
  text-align:center;
  padding:20px;
}

.success h3{color:#0f9d58;margin-bottom:10px;}

</style>
</head>
<body>

<div class="payment-container">

  <div class="header">
    <h2>Makethub Payment</h2>
    <p>Secure M-Pesa Checkout</p>
  </div>

  <div class="content" id="paymentContent">

    <div class="amount">
      <h1>KES 1,300.00</h1>
      <span>Stanley Mug</span>
    </div>

    <div class="details">
      <div><span class="label">Merchant</span><span class="value">Makethub</span></div>
      <div><span class="label">Order ID</span><span class="value">#MH12345</span></div>
      <div><span class="label">Payment Method</span><span class="value">M-Pesa</span></div>
    </div>

    <div class="input-group">
      <label>Phone Number</label>
      <input type="text" placeholder="07XXXXXXXX">
    </div>

    <button class="pay-btn" onclick="simulatePayment()">Pay Now</button>

    <div class="spinner" id="spinner"></div>

  </div>

  <div class="success" id="successBox">
    <h3>Payment Request Sent</h3>
    <p>Check your phone and enter your M-Pesa PIN.</p>
  </div>

  <div class="footer">
    Powered by Makethub
    <div class="secure">🔒 Secure Payment</div>
  </div>

</div>

<script>
function simulatePayment(){
  document.querySelector('.pay-btn').style.display='none';
  document.getElementById('spinner').style.display='block';

  setTimeout(()=>{
    document.getElementById('paymentContent').style.display='none';
    document.getElementById('successBox').style.display='block';
  },2000);
}
</script>

</body>
</html>
